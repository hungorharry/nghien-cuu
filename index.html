<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hưng Prompts - Master Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Base styles with Brutalist theme */
      body {
        background-color: #ffffff;
        color: #000000;
        font-family: "Space Mono", monospace;
      }

      /* Brutalist shadow */
      .brutalist-shadow {
        box-shadow: 4px 4px 0px #000000;
        transition: all 0.1s ease-in-out;
      }
      .brutalist-shadow:active {
        box-shadow: 1px 1px 0px #000000;
        transform: translate(3px, 3px);
      }

      /* Hover effect for hub items */
      .hub-card {
        transition: all 0.2s ease-in-out;
        cursor: pointer;
      }
      .hub-card:hover {
        transform: translate(-4px, -4px);
        box-shadow: 10px 10px 0px #000000;
        background-color: #f9fafb;
      }

      /* Popup for copy notification */
      #copySuccessPopup > div {
        background-color: #22c55e; /* Success Green */
        color: #ffffff;
        padding: 1rem 1.5rem;
        border: 4px solid #000000;
        font-weight: bold;
        text-align: center;
        box-shadow: 8px 8px 0 0 #000;
      }

      /* Scroll to Top Button */
      #scrollToTopBtn {
        display: none;
        position: fixed;
        bottom: 20px;
        right: 30px;
        z-index: 99;
        border: 2px solid #000000;
        background-color: #ffd700;
        color: #000000;
        cursor: pointer;
        padding: 10px 15px;
        font-size: 14px;
        font-weight: bold;
        border-radius: 0;
        box-shadow: 4px 4px 0px #000000;
      }

      /* Search Suggestions */
      #suggestionsList {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        border: 4px solid #000000;
        background-color: #ffffff;
        z-index: 100;
        max-height: 250px;
        overflow-y: auto;
        box-shadow: 6px 6px 0px #000000;
      }

      #suggestionsList div {
        padding: 12px;
        cursor: pointer;
        border-bottom: 2px solid #000000;
        font-weight: bold;
      }

      #suggestionsList div:hover {
        background-color: #ffff00;
      }
    </style>
  </head>
  <body class="bg-white text-black font-space-mono">
    <div class="container mx-auto px-4 py-12">
      <header class="text-center mb-16">
        <h1 class="text-5xl md:text-7xl font-bold text-black uppercase tracking-tighter mb-4">
          HƯNG PROMPTS HUB
        </h1>
        <div class="inline-block bg-black text-white px-6 py-2 font-bold text-xl mb-6">
            SYSTEM DIRECTORY
        </div>
        <p class="text-lg text-black max-w-3xl mx-auto border-2 border-black p-4 bg-gray-50 brutalist-shadow">
          Trung tâm điều hướng tất cả các danh mục Prompts chuyên sâu. Chọn một thư mục bên dưới để bắt đầu.
        </p>
      </header>

      <!-- Search Bar -->
      <div id="search-container" class="mb-16 max-w-3xl mx-auto relative">
        <div class="relative">
          <input
            type="text"
            id="searchInput"
            placeholder="Tìm nhanh danh mục (VD: chart, file, ux...)"
            class="w-full p-5 pl-14 bg-white border-4 border-black text-black focus:outline-none focus:bg-yellow-50 font-bold text-xl brutalist-shadow"
          />
          <svg
            class="w-8 h-8 text-black absolute left-4 top-1/2 -translate-y-1/2"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="3"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
            />
          </svg>
        </div>
        <div id="suggestionsList" class="hidden"></div>
      </div>

      <!-- Grid Layout for Hub -->
      <div
        id="card-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"
      >
        <!-- Cards will be populated here -->
      </div>
    </div>

    <!-- Copy Success Popup -->
    <div
      id="copySuccessPopup"
      class="fixed inset-0 z-50 flex items-center justify-center hidden pointer-events-none"
    >
      <div class="pointer-events-auto">ĐÃ SAO CHÉP ĐƯỜNG DẪN!</div>
    </div>

    <!-- Scroll to Top -->
    <button id="scrollToTopBtn" title="Lên đầu trang">TOP ▲</button>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const copyIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/></svg>`;
        const openIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z"/><path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z"/></svg>`;
        
        const copySuccessPopup = document.getElementById("copySuccessPopup");
        const scrollToTopBtn = document.getElementById("scrollToTopBtn");
        const searchInput = document.getElementById("searchInput");
        const suggestionsList = document.getElementById("suggestionsList");
        const cardGrid = document.getElementById("card-grid");

        // Updated Data to include the missing link
        const hubData = [
          {
            title: "GIAO DIỆN & UX",
            file: "giao-dien.html",
            category: "UI DESIGN",
            color: "blue",
            desc: "Tổng hợp Prompts thiết kế giao diện, trải nghiệm người dùng và HTML/CSS.",
            icon: "🎨"
          },
          {
            title: "BIỂU ĐỒ & CHART",
            file: "cac-loai-chart.html",
            category: "DATA VIZ",
            color: "green",
            desc: "Các loại biểu đồ, mô hình hóa dữ liệu và phân tích số liệu trực quan.",
            icon: "📊"
          },
          {
            title: "TÍNH NĂNG WEBSITE",
            file: "cac-tinh-nang.html",
            category: "FEATURES",
            color: "purple",
            desc: "Thư viện các tính năng tương tác, logic xử lý cho ứng dụng Web.",
            icon: "⚙️"
          },
          {
            title: "PHÂN TÍCH THỊ TRƯỜNG",
            file: "prompts-phan-tich.html",
            category: "MARKETING",
            color: "yellow",
            desc: "Câu lệnh phân tích đối thủ, nghiên cứu khách hàng và chiến lược kinh doanh.",
            icon: "📈"
          },
          {
            title: "PHÂN TÍCH FILE",
            file: "phan-tich-file.html",
            category: "FILE ANALYSIS",
            color: "cyan",
            desc: "Trích xuất dữ liệu từ tệp tin, xử lý văn bản, âm thanh và video chuyên sâu.",
            icon: "📁"
          },
          {
            title: "VIẾT BÀI CHUYÊN NGHIỆP",
            file: "viet-bai.html",
            category: "CONTENT",
            color: "red",
            desc: "Mẫu câu lệnh soạn thảo nội dung báo chí, blog, email và truyền thông.",
            icon: "✍️"
          },
          {
            title: "KHO LINK CHIA SẺ",
            file: "luu-tru-link-ai.html",
            category: "STORAGE",
            color: "blue",
            desc: "Lưu trữ các liên kết chia sẻ trực tiếp từ Gemini (Mascot, Studio, Debate...).",
            icon: "🔗"
          }
        ];

        function renderCards(data) {
          cardGrid.innerHTML = "";
          data.forEach(item => {
            const card = document.createElement("article");
            card.className = "hub-card bg-white flex flex-col border-4 border-black brutalist-shadow";
            
            const colorMap = {
              blue: "bg-blue-400",
              green: "bg-green-400",
              purple: "bg-purple-400",
              yellow: "bg-yellow-400",
              cyan: "bg-cyan-400",
              red: "bg-red-400"
            };

            card.innerHTML = `
              <div class="p-4 border-b-4 border-black ${colorMap[item.color]}">
                <div class="flex justify-between items-center">
                  <span class="text-xs font-bold px-2 py-1 bg-black text-white uppercase">${item.category}</span>
                  <span class="text-2xl">${item.icon}</span>
                </div>
                <h2 class="font-bold text-2xl mt-3 uppercase leading-tight">${item.title}</h2>
              </div>
              <div class="p-6 flex-grow bg-white border-b-2 border-black">
                <p class="text-black font-bold mb-4 h-12 overflow-hidden text-ellipsis">${item.desc}</p>
                <div class="bg-gray-100 p-2 border-2 border-black mb-4">
                   <code class="text-[11px] block truncate font-bold text-gray-700">${item.file}</code>
                </div>
              </div>
              <div class="p-4 bg-gray-50 flex justify-between items-center">
                <button class="copy-btn p-3 border-4 border-black bg-white hover:bg-yellow-300 transition-all" data-file="${item.file}" title="Copy filename">
                  ${copyIconSvg}
                </button>
                <a href="./${item.file}" class="flex-grow ml-4 py-3 border-4 border-black bg-black text-white font-bold text-center hover:bg-white hover:text-black transition-all flex items-center justify-center gap-2">
                  TRUY CẬP ${openIconSvg}
                </a>
              </div>
            `;
            cardGrid.appendChild(card);
          });
          initFunctions();
        }

        function initFunctions() {
          document.querySelectorAll(".copy-btn").forEach(btn => {
            btn.onclick = (e) => {
              e.stopPropagation();
              const fileName = btn.getAttribute("data-file");
              const el = document.createElement('textarea');
              el.value = fileName;
              document.body.appendChild(el);
              el.select();
              document.execCommand('copy');
              document.body.removeChild(el);
              
              copySuccessPopup.classList.remove("hidden");
              setTimeout(() => copySuccessPopup.classList.add("hidden"), 1500);
            };
          });
        }

        searchInput.oninput = () => {
          const val = searchInput.value.toLowerCase().trim();
          const filtered = hubData.filter(i => 
            i.title.toLowerCase().includes(val) || 
            i.category.toLowerCase().includes(val) ||
            i.file.toLowerCase().includes(val)
          );
          renderCards(filtered);

          suggestionsList.innerHTML = "";
          if (val) {
            const matches = hubData.filter(i => i.title.toLowerCase().includes(val)).slice(0, 4);
            if (matches.length > 0) {
              suggestionsList.classList.remove("hidden");
              matches.forEach(m => {
                const div = document.createElement("div");
                div.textContent = `📂 ${m.title}`;
                div.onclick = () => {
                  searchInput.value = m.title;
                  suggestionsList.classList.add("hidden");
                  renderCards([m]);
                };
                suggestionsList.appendChild(div);
              });
            } else {
              suggestionsList.classList.add("hidden");
            }
          } else {
            suggestionsList.classList.add("hidden");
          }
        };

        window.onscroll = () => {
          if (window.pageYOffset > 200) scrollToTopBtn.style.display = "block";
          else scrollToTopBtn.style.display = "none";
        };
        scrollToTopBtn.onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});

        renderCards(hubData);
      });
    </script>
  </body>
</html>\
