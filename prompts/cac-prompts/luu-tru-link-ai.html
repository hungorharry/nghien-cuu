<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Lưu Trữ Link Chia Sẻ Gemini</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Base styles with Brutalist theme */
        body {
            background-color: #FFFFFF;
            color: #000000;
            font-family: 'Space Mono', monospace;
        }
        
        /* Brutalist shadow */
        .brutalist-shadow {
            box-shadow: 4px 4px 0px #000000;
            transition: all 0.1s ease-in-out;
        }
        .brutalist-shadow:active {
            box-shadow: 1px 1px 0px #000000;
            transform: translate(3px, 3px);
        }

        /* Popup thông báo */
        #copySuccessPopup > div {
            background-color: #00FF00; /* Green accent for success */
            color: #000000;
            padding: 1rem 1.5rem;
            border: 4px solid #000000;
            font-weight: bold;
            text-align: center;
            box-shadow: 8px 8px 0 0 #000;
        }

        .link-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-white text-black font-space-mono">

    <div class="container mx-auto px-4 py-12">
        <header class="text-center mb-16">
            <!-- Navigation Button -->
            <div class="mb-8">
                <a href="/prompts/cac-promptscatalog-prompts.html" class="inline-block bg-cyan-400 hover:bg-cyan-500 text-black font-bold py-2 px-4 border-2 border-black brutalist-shadow">
                    ‹ Trở về Catalogue Chính
                </a>
            </div>

            <h1 class="text-4xl md:text-6xl font-bold text-black uppercase tracking-tighter">
                KHO LƯU TRỮ LINK GEMINI
            </h1>
            <div class="mt-4 inline-block bg-yellow-300 border-2 border-black px-4 py-1 font-bold">
                Cập nhật: 2026 / AI RESOURCE
            </div>
            <p class="mt-6 text-lg text-black max-w-2xl mx-auto border-l-4 border-black pl-4">
                Danh sách tổng hợp các tài nguyên AI, prompt tạo Mascot, Studio và các công cụ phân tích từ Gemini.
            </p>
        </header>

        <!-- Search Bar -->
        <div id="search-container" class="mb-12 max-w-2xl mx-auto">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Tìm kiếm tên link, nội dung hoặc chủ đề..." class="w-full p-4 pl-12 bg-white border-4 border-black text-black focus:outline-none focus:bg-yellow-50 font-bold brutalist-shadow">
                <svg class="w-6 h-6 text-black absolute left-4 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                </svg>
            </div>
        </div>

        <!-- Grid Layout -->
        <div id="card-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Dữ liệu sẽ đổ vào đây -->
        </div>
    </div>

    <!-- Popup -->
    <div id="copySuccessPopup" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 hidden">
        <div>ĐÃ SAO CHÉP LIÊN KẾT!</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const copyIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/></svg>`;
            const openIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z"/><path fill-rule="evenodd" d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z"/></svg>`;

            const linksData = [
                {
                    title: "MASCOT 3D",
                    category: "3D DESIGN",
                    color: "bg-blue-400",
                    desc: "Tài nguyên và câu lệnh tạo hình nhân vật Mascot định dạng 3D chuyên nghiệp.",
                    url: "https://gemini.google.com/share/200629828534"
                },
                {
                    title: "STUDIO HÀNG GIA DỤNG",
                    category: "STUDIO",
                    color: "bg-green-400",
                    desc: "Thiết lập bối cảnh studio chuyên nghiệp để chụp và quảng bá sản phẩm gia dụng.",
                    url: "https://gemini.google.com/share/339de232d1c1"
                },
                {
                    title: "mascot AI",
                    category: "MASCOT",
                    color: "bg-purple-400",
                    desc: "Hệ thống tạo và tối ưu hóa nhân vật đại diện (mascot) bằng trí tuệ nhân tạo.",
                    url: "https://gemini.google.com/share/e6543cae17f7"
                },
                {
                    title: "ai phân tích debate",
                    category: "DEBATE",
                    color: "bg-yellow-400",
                    desc: "Công cụ phân tích các cuộc tranh biện, đánh giá lập luận và tư duy logic.",
                    url: "https://gemini.google.com/share/cb635848a456"
                },
                {
                    title: "AI CHẤM ĐIỂM",
                    category: "GRADING",
                    color: "bg-cyan-400",
                    desc: "Hệ thống tự động chấm điểm và nhận xét dựa trên các tiêu chí định sẵn.",
                    url: "https://gemini.google.com/share/eb9a5ce023a1"
                }
            ];

            const cardGrid = document.getElementById('card-grid');
            const searchInput = document.getElementById('searchInput');
            const popup = document.getElementById('copySuccessPopup');

            function renderLinks(data) {
                cardGrid.innerHTML = '';
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'link-card flex flex-col border-4 border-black brutalist-shadow bg-white';
                    card.innerHTML = `
                        <div class="p-4 border-b-4 border-black ${item.color}">
                            <span class="text-xs font-bold px-2 py-1 bg-black text-white uppercase">${item.category}</span>
                            <h2 class="mt-2 text-xl font-bold uppercase leading-tight">${item.title}</h2>
                        </div>
                        <div class="p-4 flex-grow italic text-sm">
                            "${item.desc}"
                        </div>
                        <div class="p-4 bg-gray-50 border-t-2 border-black flex items-center justify-between">
                            <code class="text-[10px] truncate mr-2 font-bold">${item.url}</code>
                            <div class="flex gap-2">
                                <button onclick="copyLink('${item.url}')" class="p-2 border-2 border-black bg-white hover:bg-black hover:text-white transition-colors" title="Copy Link">
                                    ${copyIconSvg}
                                </button>
                                <a href="${item.url}" target="_blank" class="p-2 border-2 border-black bg-black text-white hover:bg-white hover:text-black transition-colors">
                                    ${openIconSvg}
                                </a>
                            </div>
                        </div>
                    `;
                    cardGrid.appendChild(card);
                });
            }

            // Fallback copy method using document.execCommand
            window.copyLink = (url) => {
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = url;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-9999px";
                    textArea.style.top = "0";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);

                    if (successful) {
                        const popup = document.getElementById('copySuccessPopup');
                        popup.classList.remove('hidden');
                        setTimeout(() => popup.classList.add('hidden'), 2000);
                    }
                } catch (err) {
                    console.error('Không thể sao chép văn bản: ', err);
                }
            };

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = linksData.filter(i => 
                    i.title.toLowerCase().includes(term) || 
                    i.desc.toLowerCase().includes(term) || 
                    i.category.toLowerCase().includes(term)
                );
                renderLinks(filtered);
            });

            // Initial render
            renderLinks(linksData);
        });
    </script>
</body>
</html>
