<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue Prompt Tạo Function & Tính năng Web</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Base styles with Brutalist theme */
        body {
            background-color: #FFFFFF; /* White background */
            color: #000000; /* Black text */
            font-family: 'Space Mono', monospace; /* Monospace font for the whole page */
        }

        /* Brutalist shadow for interactive elements */
        .brutalist-shadow {
            box-shadow: 4px 4px 0px #000000;
            transition: all 0.1s ease-in-out;
        }
        .brutalist-shadow:active {
            box-shadow: 1px 1px 0px #000000;
            transform: translate(3px, 3px);
        }

        /* Brutalist popup for copy notification */
        #copy-popup {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: #00FFFF; /* Bright Cyan accent */
            color: #000000;
            padding: 1rem 1.5rem;
            border: 2px solid #000000;
            font-family: 'Space Mono', monospace;
            box-shadow: 4px 4px 0px #000000;
            z-index: 9999;
            display: none; /* Initially hidden */
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body class="bg-white text-black font-space-mono">

    <div class="container mx-auto px-4 py-12">
        <header class="text-center mb-16">
             <!-- Navigation Button -->
            <div class="mb-8">
                <a href="/index.html" class="inline-block bg-cyan-400 hover:bg-cyan-500 text-black font-bold py-2 px-4 border-2 border-black brutalist-shadow">
                    ‹ Trở về Catalogue Chính
                </a>
            </div>
            
            <h1 class="text-5xl md:text-6xl font-bold text-black">Catalogue Prompt Lập Trình</h1>
            <p class="mt-4 text-lg text-black max-w-3xl mx-auto">Các câu lệnh mẫu để tạo ra các hàm và các tính năng website phổ biến.</p>
        </header>

        <!-- Search Bar -->
        <div id="search-container" class="mb-12 max-w-2xl mx-auto relative">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Tìm kiếm chức năng, ví dụ: 'API', 'sắp xếp', 'modal'..." class="w-full p-4 pl-12 bg-white border-2 border-black text-black focus:outline-none focus:border-blue-500 font-space-mono">
                <svg class="w-6 h-6 text-black absolute left-4 top-1/2 -translate-y-1/2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
                </svg>
            </div>
        </div>

        <!-- Grid Layout for Catalog -->
        <div id="card-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Cards will be populated here by JavaScript -->
        </div>
    </div>
    
    <!-- Brutalist Popup element -->
    <div id="copy-popup">PROMPT<br>COPIED!</div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const copyIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/></svg>`;
            
            const cardsData = [
                { color: 'blue', title: "1. Sắp xếp Mảng", description: "Sắp xếp các phần tử của một mảng theo thứ tự.", illustration: `<div class="flex-grow flex items-end justify-center p-4 space-x-2 min-h-[150px]"><div class="w-1/5 h-1/4 bg-blue-500"></div><div class="w-1/5 h-1/2 bg-blue-500"></div><div class="w-1/5 h-full bg-blue-500"></div><div class="w-1/5 h-2/3 bg-blue-500"></div></div>`, prompt: "Viết một hàm trong JavaScript để sắp xếp một mảng các số theo thứ tự tăng dần." },
                { color: 'fuchsia', title: "2. Lọc Dữ liệu", description: "Tạo mảng mới với các phần tử thỏa mãn điều kiện.", illustration: `<div class="flex-grow flex items-center justify-center p-4 space-x-2 min-h-[150px]"><div class="w-8 h-8 bg-fuchsia-500"></div><div class="w-8 h-8 bg-gray-300"></div><div class="w-8 h-8 bg-fuchsia-500"></div><div class="w-8 h-8 bg-gray-300"></div></div>`, prompt: "Tạo một hàm nhận vào một mảng các số và trả về một mảng mới chỉ chứa các số chẵn." },
                { color: 'blue', title: "3. Gọi API", description: "Lấy dữ liệu từ một nguồn bên ngoài qua mạng.", illustration: `<div class="flex-grow flex items-center justify-evenly p-4 min-h-[150px]"><div class="font-bold text-3xl">[ 🖥️ ]</div><svg class="w-12 h-12 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg><div class="font-bold text-3xl">[ ☁️ ]</div></div>`, prompt: "Viết một hàm async/await trong JavaScript để gọi API từ URL 'https://api.example.com/users' và trả về dữ liệu JSON." },
                { color: 'fuchsia', title: "4. Đảo ngược Chuỗi", description: "Lật ngược thứ tự các ký tự trong một chuỗi.", illustration: `<div class="flex-grow flex items-center justify-center p-4 min-h-[150px]"><div class="font-mono text-3xl font-bold">ABC → CBA</div></div>`, prompt: "Tạo một hàm nhận vào một chuỗi và trả về chuỗi đó đã được đảo ngược mà không dùng hàm reverse() có sẵn." },
                { color: 'blue', title: "5. Kiểm tra Số nguyên tố", description: "Xác định một số có phải là số nguyên tố hay không.", illustration: `<div class="flex-grow flex items-center justify-center p-4 min-h-[150px]"><div class="text-center"><div class="font-bold text-5xl text-blue-600">13</div><div class="mt-2 p-1 bg-green-400 text-black border border-black">PRIME</div></div></div>`, prompt: "Viết một hàm để kiểm tra xem một số nguyên dương đầu vào có phải là số nguyên tố hay không. Tối ưu hóa hiệu năng." },
                { color: 'fuchsia', title: "6. Xác thực Email", description: "Kiểm tra một chuỗi có đúng định dạng email không.", illustration: `<div class="flex-grow flex items-center justify-center p-4 min-h-[150px]"><div class="px-3 py-2 bg-gray-200 border-2 border-black font-mono">name@domain.com</div></div>`, prompt: "Viết một hàm sử dụng Biểu thức chính quy (Regex) trong Python để xác thực một địa chỉ email có hợp lệ hay không." },
                { color: 'blue', title: "7. Tính Giai thừa", description: "Tính tích của tất cả các số nguyên dương từ 1 đến n.", illustration: `<div class="flex-grow flex items-center justify-center p-4 min-h-[150px]"><div class="font-mono text-3xl font-bold">5! = 120</div></div>`, prompt: "Viết một hàm đệ quy để tính giai thừa của một số nguyên không âm. Xử lý trường hợp đầu vào là 0." },
                { color: 'fuchsia', title: "8. Thao tác DOM", description: "Thay đổi nội dung hoặc cấu trúc của trang web.", illustration: `<div class="flex-grow p-4 flex flex-col justify-center items-center min-h-[150px]"><div class="p-2 border-2 border-dashed border-black">#title</div><div class="text-2xl my-1">↓</div><div class="p-2 border-2 border-black bg-fuchsia-300">Hello!</div></div>`, prompt: "Viết một hàm JavaScript tìm một phần tử HTML có id là 'welcome-message' và thay đổi nội dung văn bản của nó." },
                { color: 'blue', title: "9. Gộp Đối tượng", description: "Kết hợp thuộc tính của nhiều đối tượng vào một.", illustration: `<div class="flex-grow flex items-center justify-evenly p-4 min-h-[150px]"><div class="w-12 h-12 border-2 border-black bg-blue-300"></div><div class="text-3xl font-bold">+</div><div class="w-12 h-12 border-2 border-black bg-cyan-300"></div></div>`, prompt: "Tạo một hàm nhận vào hai đối tượng và trả về một đối tượng mới chứa tất cả các thuộc tính từ cả hai." },
                { color: 'fuchsia', title: "10. Tìm Max/Min", description: "Tìm giá trị lớn nhất hoặc nhỏ nhất trong một tập hợp.", illustration: `<div class="flex-grow flex items-end justify-center p-4 space-x-2 min-h-[150px]"><div class="w-1/5 h-1/4 bg-gray-300"></div><div class="w-1/5 h-full bg-fuchsia-500 border-2 border-black"></div><div class="w-1/5 h-1/2 bg-gray-300"></div><div class="w-1/5 h-2/3 bg-gray-300"></div></div>`, prompt: "Viết một hàm để tìm số lớn nhất trong một mảng các số mà không sử dụng hàm Math.max()." },
                { color: 'blue', title: "11. Xóa Trùng lặp", description: "Loại bỏ các phần tử bị lặp lại trong một mảng.", illustration: `<div class="flex-grow flex items-center justify-center p-4 space-x-2 min-h-[150px]"><div class="w-8 h-8 bg-blue-500 border-2 border-black"></div><div class="w-8 h-8 bg-gray-300 border-2 border-black"></div><div class="w-8 h-8 bg-blue-500 border-2 border-black line-through opacity-40"></div></div>`, prompt: "Tạo một hàm nhận vào một mảng và trả về một mảng mới không chứa các phần tử trùng lặp." },
                { color: 'fuchsia', title: "12. Kiểm tra Palindrome", description: "Kiểm tra chuỗi đọc xuôi ngược đều giống nhau.", illustration: `<div class="flex-grow flex items-center justify-center p-4 min-h-[150px]"><div class="font-mono text-4xl font-bold tracking-widest">madam</div></div>`, prompt: "Viết một hàm kiểm tra xem một chuỗi có phải là palindrome hay không (không phân biệt chữ hoa/thường và bỏ qua khoảng trắng)." },
                { color: 'blue', title: "13. Sao chép sâu Đối tượng", description: "Tạo bản sao độc lập hoàn toàn của một đối tượng.", illustration: `<div class="flex-grow flex items-center justify-center p-4 min-h-[150px]"><div class="relative"><div class="w-12 h-12 bg-blue-400 border-2 border-black"></div><div class="w-12 h-12 bg-blue-600 absolute top-2 left-2 border-2 border-black"></div></div></div>`, prompt: "Tạo một hàm 'deepCopy' trong JavaScript để sao chép sâu một đối tượng, bao gồm cả các đối tượng lồng nhau." },
                { color: 'fuchsia', title: "14. Chuyển sang Dạng Tiêu đề", description: "Viết hoa chữ cái đầu tiên của mỗi từ trong câu.", illustration: `<div class="flex-grow flex items-center justify-center p-4 min-h-[150px]"><div class="text-3xl font-bold">Hello World</div></div>`, prompt: "Viết một hàm nhận một chuỗi và chuyển nó thành dạng Title Case (viết hoa chữ cái đầu mỗi từ)." },
                { color: 'blue', title: "15. Hàm Debounce", description: "Trì hoãn việc thực thi hàm cho đến khi người dùng ngừng thao tác.", illustration: `<div class="flex-grow flex items-center justify-center p-4 min-h-[150px]"><svg class="w-24 h-24 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>`, prompt: "Tạo một hàm 'debounce' nhận một hàm khác và một khoảng thời gian chờ (delay) làm tham số." },
                { color: 'fuchsia', title: "16. Tạo màu HEX ngẫu nhiên", description: "Tạo ra một mã màu thập lục phân ngẫu nhiên.", illustration: `<div class="flex-grow flex items-center justify-center p-4 min-h-[150px]"><div class="p-2 bg-gray-200 border-2 border-black font-mono font-bold text-xl">#A4B8E1</div></div>`, prompt: "Viết một hàm JavaScript không có tham số để tạo và trả về một mã màu HEX ngẫu nhiên (ví dụ: '#1a2b3c')." },
                { color: 'blue', title: "17. Tạo Slider Ảnh (Carousel)", description: "Hiển thị một chuỗi hình ảnh có thể chuyển qua lại.", illustration: `<div class="flex-grow flex items-center justify-between p-4 min-h-[150px]"><div class="text-3xl font-bold">‹</div><div class="w-24 h-16 bg-blue-300 border-2 border-black"></div><div class="text-3xl font-bold">›</div></div>`, prompt: "Tạo một component slider ảnh bằng HTML, CSS, và JavaScript với các nút Next/Previous." },
                { color: 'fuchsia', title: "18. Component Tabs", description: "Tổ chức nội dung vào các tab có thể chuyển đổi.", illustration: `<div class="flex-grow p-4 w-full min-h-[150px]"><div class="flex border-b-2 border-black"><div class="px-4 py-1 text-black bg-fuchsia-300 border-2 border-b-0 border-black">Tab 1</div><div class="px-4 py-1 text-black">Tab 2</div></div><div class="p-2 text-sm border-x-2 border-b-2 border-black h-16">Nội dung Tab 1...</div></div>`, prompt: "Xây dựng một hệ thống tabs, khi nhấn vào một tab thì hiển thị nội dung tương ứng và ẩn các nội dung khác." },
                { color: 'blue', title: "19. Component Accordion", description: "Hiển thị/ẩn nội dung khi người dùng nhấn vào tiêu đề.", illustration: `<div class="flex-grow p-4 w-full min-h-[150px]"><div class="w-full bg-gray-200 border-2 border-black"><div class="p-2 flex justify-between items-center text-blue-800 font-bold"><span>Câu hỏi 1</span><span>+</span></div></div></div>`, prompt: "Tạo một component accordion cho mục câu hỏi thường gặp (FAQ), chỉ cho phép một mục được mở tại một thời điểm." },
                { color: 'fuchsia', title: "20. Cửa sổ Modal/Popup", description: "Hiển thị một hộp thoại đè lên nội dung trang.", illustration: `<div class="flex-grow p-4 flex items-center justify-center min-h-[150px]"><div class="w-4/5 p-4 bg-fuchsia-300 border-2 border-black shadow-lg">Nội dung Modal</div></div>`, prompt: "Tạo một cửa sổ modal hiện ra khi nhấn nút, có lớp phủ mờ phía sau và nút để đóng lại." },
                { color: 'blue', title: "21. Cuộn mượt (Smooth Scroll)", description: "Cuộn đến một phần của trang một cách mượt mà.", illustration: `<div class="flex-grow p-4 flex flex-col justify-center items-center min-h-[150px]"><div class="w-full h-2 bg-gray-300"></div><div class="text-4xl my-2 font-bold">↓</div><div class="w-full h-2 bg-gray-300"></div></div>`, prompt: "Viết code JavaScript để khi nhấn vào một link có href dạng '#section-id', trang sẽ cuộn mượt đến phần tử có id đó." },
                { color: 'fuchsia', title: "22. Nút 'Lên Đầu Trang'", description: "Hiện nút khi cuộn xuống và cuộn lên đầu khi nhấn.", illustration: `<div class="flex-grow p-4 flex items-end justify-end min-h-[150px]"><div class="w-12 h-12 bg-fuchsia-500 border-2 border-black flex items-center justify-center text-2xl text-white font-bold">↑</div></div>`, prompt: "Tạo nút 'Back to Top' chỉ hiện ra khi người dùng cuộn xuống 200px, và cuộn lên đầu trang khi được nhấn." },
                { color: 'blue', title: "23. Tải lười (Lazy Loading)", description: "Chỉ tải ảnh khi chúng xuất hiện trong màn hình xem.", illustration: `<div class="flex-grow p-4 flex items-center justify-center min-h-[150px]"><div class="w-24 h-16 bg-gray-200 border-2 border-dashed border-black flex items-center justify-center"><span class="text-black">Image</span></div></div>`, prompt: "Triển khai lazy loading cho các thẻ 'img' bằng cách sử dụng Intersection Observer API." },
                { color: 'fuchsia', title: "24. Chế độ Sáng/Tối", description: "Chuyển đổi giao diện giữa chủ đề sáng và tối.", illustration: `<div class="flex-grow p-4 flex items-center justify-center min-h-[150px]"><div class="w-16 h-8 bg-black border-2 border-black p-1 flex items-center"><div class="w-6 h-6 bg-white"></div></div></div>`, prompt: "Tạo một nút bấm để chuyển đổi qua lại giữa chế độ sáng và tối bằng cách thêm/xóa một class 'dark' vào thẻ body." },
                { color: 'blue', title: "25. Sao chép vào Clipboard", description: "Sao chép một đoạn văn bản vào bộ nhớ tạm.", illustration: `<div class="flex-grow p-4 flex items-center justify-center min-h-[150px]"><div class="p-3 bg-blue-200 border-2 border-black">Copy Text 📋</div></div>`, prompt: "Viết một hàm nhận một chuỗi văn bản và sao chép nó vào clipboard của người dùng khi một nút được nhấn." },
                { color: 'fuchsia', title: "26. Đếm ngược (Countdown)", description: "Hiển thị đồng hồ đếm ngược đến một thời điểm.", illustration: `<div class="flex-grow p-4 flex items-center justify-center font-mono text-4xl font-bold min-h-[150px]">10:59</div>`, prompt: "Tạo một đồng hồ đếm ngược đến một ngày cụ thể trong tương lai, hiển thị ngày, giờ, phút, giây còn lại." },
                { color: 'blue', title: "27. Phân trang (Pagination)", description: "Chia một danh sách dài thành nhiều trang.", illustration: `<div class="flex-grow p-4 flex items-center justify-center space-x-2 min-h-[150px]"><div class="w-8 h-8 border-2 border-black bg-blue-500 text-white flex items-center justify-center">1</div><div class="w-8 h-8 border-2 border-black bg-gray-200 flex items-center justify-center">2</div><div class="w-8 h-8 border-2 border-black bg-gray-200 flex items-center justify-center">...</div></div>`, prompt: "Tạo logic phân trang cho một mảng dữ liệu, hiển thị 10 mục mỗi trang và các nút để chuyển trang." },
                { color: 'fuchsia', title: "28. Xác thực Form", description: "Kiểm tra đầu vào của người dùng trong một form.", illustration: `<div class="flex-grow p-4 flex flex-col space-y-2 min-h-[150px]"><div class="w-full p-2 bg-white border-2 border-red-500"></div><div class="text-xs text-red-600">Trường này là bắt buộc.</div></div>`, prompt: "Viết mã JavaScript để xác thực một form liên hệ: kiểm tra trường email và đảm bảo trường tin nhắn không bị bỏ trống." },
                { color: 'blue', title: "29. Thêm vào Giỏ hàng", description: "Chức năng cơ bản của trang thương mại điện tử.", illustration: `<div class="flex-grow p-4 flex items-center justify-center min-h-[150px]"><div class="p-3 bg-blue-500 border-2 border-black text-white brutalist-shadow">Thêm vào giỏ 🛒</div></div>`, prompt: "Tạo hàm để thêm một sản phẩm (dưới dạng object) vào một mảng 'cart'. Nếu sản phẩm đã tồn tại, tăng số lượng lên." },

            const cardGrid = document.getElementById('card-grid');
            
            function renderCards(dataToRender) {
                cardGrid.innerHTML = '';
                dataToRender.forEach((card, index) => {
                    const cardElement = document.createElement('article');
                    cardElement.id = `card-${index + 1}`;
                    cardElement.className = 'bg-white flex flex-col border-2 border-black';
                    
                    const accentColorClass = card.color === 'blue' ? 'text-blue-600' : 'text-fuchsia-600';

                    cardElement.innerHTML = `
                        <div class="p-4 border-b-2 border-black">
                            <h2 class="font-bold text-lg ${accentColorClass}">${card.title}</h2>
                            <p class="text-black text-sm h-10">${card.description}</p>
                        </div>
                        <div class="flex-grow flex items-center justify-center bg-gray-100 border-b-2 border-black">
                            ${card.illustration}
                        </div>
                        <div class="p-4 bg-white">
                            <pre class="bg-gray-100 p-3 border border-black text-xs font-space-mono whitespace-pre-wrap"><code>${card.prompt}</code></pre>
                            <div class="text-right mt-3">
                                <button class="copy-btn brutalist-shadow inline-block p-2 bg-cyan-400 hover:bg-cyan-500 border-2 border-black text-black" title="Sao chép"></button>
                            </div>
                        </div>
                    `;
                    cardGrid.appendChild(cardElement);
                });
                
                initializeCopyButtons();
            }

            function initializeCopyButtons() {
                const popup = document.getElementById('copy-popup');
                cardGrid.removeEventListener('click', copyHandler); // Remove old listener before adding new one
                cardGrid.addEventListener('click', copyHandler);

                function copyHandler(event) {
                    const button = event.target.closest('.copy-btn');
                    if (!button) return;

                    const preElement = button.closest('.p-4').querySelector('pre');

                    if (preElement) {
                        const codeText = preElement.querySelector('code').innerText;
                        navigator.clipboard.writeText(codeText).then(() => {
                            popup.style.display = 'block';
                            setTimeout(() => { popup.style.display = 'none'; }, 2000);
                        }).catch(err => {
                            console.error('Failed to copy text: ', err);
                            const textArea = document.createElement('textarea');
                            textArea.value = codeText;
                            textArea.style.position = 'fixed';
                            textArea.style.opacity = '0';
                            document.body.appendChild(textArea);
                            textArea.select();
                            try {
                                document.execCommand('copy');
                                popup.style.display = 'block';
                                setTimeout(() => { popup.style.display = 'none'; }, 2000);
                            } catch (fallbackErr) {
                                console.error('Fallback copy failed: ', fallbackErr);
                            }
                            document.body.removeChild(textArea);
                        });
                    }
                }

                document.querySelectorAll('.copy-btn').forEach(button => {
                    button.innerHTML = copyIconSvg;
                });
            }

            // Initial render
            renderCards(cardsData);

            // Search functionality
            const searchInput = document.getElementById('searchInput');

            searchInput.addEventListener('input', () => {
                const query = searchInput.value.toLowerCase().trim();
                const filteredCards = cardsData.filter(card => 
                    card.title.toLowerCase().includes(query) || 
                    card.description.toLowerCase().includes(query) ||
                    card.prompt.toLowerCase().includes(query)
                );
                renderCards(filteredCards);
            });
        });
    </script>

</body>
</html>
