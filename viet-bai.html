<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catalogue 70 Câu Lệnh Mẫu Viết Bài Chuyên Nghiệp</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Base styles with Brutalist theme */
      body {
        background-color: #ffffff; /* White background */
        color: #000000; /* Black text */
        font-family: "Space Mono", monospace; /* Monospace font for the whole page */
      }

      /* Brutalist shadow for interactive elements */
      .brutalist-shadow {
        box-shadow: 4px 4px 0px #000000;
        transition: all 0.1s ease-in-out;
      }
      .brutalist-shadow:active {
        box-shadow: 1px 1px 0px #000000;
        transform: translate(3px, 3px);
      }

      /* Brutalist Popup for copy notification */
      #copySuccessPopup > div {
        background-color: #00ffff; /* Bright Cyan accent */
        color: #000000;
        padding: 1rem 1.5rem;
        border: 4px solid #000000;
        font-weight: bold;
        text-align: center;
        box-shadow: 8px 8px 0 0 #000;
      }

      /* Scroll to Top Button */
      #scrollToTopBtn {
        display: none; /* Hidden by default */
        position: fixed; /* Fixed position */
        bottom: 20px; /* Place at the bottom */
        right: 30px; /* Place at the right */
        z-index: 99; /* Make sure it's on top */
        border: 2px solid #000000; /* Brutalist border */
        background-color: #ffd700; /* Gold color for visibility */
        color: #000000;
        cursor: pointer;
        padding: 10px 15px;
        font-size: 18px;
        font-weight: bold;
        text-align: center;
        border-radius: 0; /* Sharp corners */
        box-shadow: 4px 4px 0px #000000; /* Brutalist shadow */
        transition: all 0.1s ease-in-out;
      }

      #scrollToTopBtn:hover {
        background-color: #ffc400; /* Darker gold on hover */
      }

      #scrollToTopBtn:active {
        box-shadow: 1px 1px 0px #000000;
        transform: translate(3px, 3px);
      }

      /* Search Suggestions */
      #suggestionsList {
        position: absolute;
        top: 100%; /* Position below the search input */
        left: 0;
        right: 0;
        border: 2px solid #000000;
        border-top: none; /* No top border, connects to input */
        background-color: #ffffff;
        z-index: 100; /* Above other content */
        max-height: 200px;
        overflow-y: auto;
        box-shadow: 4px 4px 0px #000000;
      }

      #suggestionsList div {
        padding: 10px 12px;
        cursor: pointer;
        border-bottom: 1px solid #e0e0e0;
      }

      #suggestionsList div:last-child {
        border-bottom: none;
      }

      #suggestionsList div:hover {
        background-color: #f0f0f0;
      }
    </style>
  </head>
  <body class="bg-white text-black font-space-mono">
    <div class="container mx-auto px-4 py-12">
      <header class="text-center mb-16">
        <!-- Navigation Button -->
        <div class="mb-8">
          <a
            href="/index.html"
            class="inline-block bg-cyan-400 hover:bg-cyan-500 text-black font-bold py-2 px-4 border-2 border-black brutalist-shadow"
          >
            ‹ Trở về Catalogue Chính
          </a>
        </div>

        <h1 class="text-5xl md:text-6xl font-bold text-black">
          Catalogue Prompts Viết Bài Chuyên Nghiệp
        </h1>
        <p class="mt-4 text-lg text-black max-w-3xl mx-auto">
          70 câu lệnh mẫu giúp bạn tạo nội dung chuyên nghiệp, từ tin tức, phân
          tích đến marketing và truyền thông.
        </p>
      </header>

      <!-- Search Bar -->
      <div id="search-container" class="mb-12 max-w-2xl mx-auto relative">
        <div class="relative">
          <input
            type="text"
            id="searchInput"
            placeholder="Tìm kiếm, ví dụ: 'thông báo', 'phân tích', 'marketing', 'báo chí'..."
            class="w-full p-4 pl-12 bg-white border-2 border-black text-black focus:outline-none focus:border-blue-500 font-space-mono"
          />
          <svg
            class="w-6 h-6 text-black absolute left-4 top-1/2 -translate-y-1/2"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
            />
          </svg>
        </div>
        <!-- Suggestions List -->
        <div id="suggestionsList" class="hidden"></div>
      </div>

      <!-- Grid Layout for Catalog -->
      <div
        id="card-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"
      >
        <!-- Cards will be populated here -->
      </div>
    </div>

    <!-- Brutalist Copy Success Popup -->
    <div
      id="copySuccessPopup"
      class="fixed inset-0 z-50 flex items-center justify-center hidden"
    >
      <div>Đã sao chép thành công!</div>
    </div>

    <!-- Scroll to Top Button -->
    <button id="scrollToTopBtn" title="Lên đầu trang">⬆️</button>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const copyIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/></svg>`;
        const copySuccessPopup = document.getElementById("copySuccessPopup");
        const scrollToTopBtn = document.getElementById("scrollToTopBtn");
        const searchInput = document.getElementById("searchInput");
        const suggestionsList = document.getElementById("suggestionsList");

        const cardsData = [
          // Chính Nhân Prompts (1-4) - Giữ nguyên vì đã phù hợp với viết bài chuyên nghiệp
          {
            title: "1. Thông báo/Ra mắt sản phẩm mới",
            color: "blue",
            description:
              "Soạn bản tin ngắn về việc Chính Nhân giới thiệu dòng laptop AI mới.",
            illustration: `<div class="text-6xl">✨</div>`,
            prompt:
              "Soạn một bản tin chuyên nghiệp về việc Chính Nhân ra mắt dòng laptop tích hợp AI mới nhất. Bài viết cần có góc nhìn sâu sắc về tác động của công nghệ này đến trải nghiệm người dùng thực tế, không chỉ liệt kê tính năng mà còn phân tích lợi ích cụ thể. Hãy sử dụng ngôn ngữ báo chí khách quan, sắc bén, tập trung vào các chi tiết độc đáo và tiềm năng thay đổi thị trường, để bài viết mang đậm dấu ấn con người và khó bị AI phát hiện.",
          },
          {
            title: "2. Phân tích xu hướng công nghệ liên quan đến Chính Nhân",
            color: "blue",
            description:
              "Viết bài phân tích xu hướng tích hợp AI trong laptop, vai trò của Chính Nhân.",
            illustration: `<div class="text-6xl">📈</div>`,
            prompt:
              "Viết một bài phân tích sâu sắc về xu hướng AI tích hợp trong laptop, tập trung vào vai trò chiến lược của Chính Nhân trong việc định hình thị trường Việt Nam. Bài viết cần đi sâu vào phân tích đa chiều, sử dụng các ví dụ thực tế và nhận định từ các chuyên gia độc lập. Giọng văn cần sắc sảo, thuyết phục, thể hiện sự am hiểu sâu rộng về thị trường và công nghệ, tránh lối viết chung chung để không bị nhận diện là AI.",
          },
          {
            title: "3. Tin tức về sự kiện hoặc thành tựu của Chính Nhân",
            color: "blue",
            description:
              "Soạn bản tin thời sự về sự kiện Chính Nhân tổ chức hội thảo AI trong giáo dục.",
            illustration: `<div class="text-6xl">🎉</div>`,
            prompt:
              "Soạn một bản tin thời sự chuyên nghiệp về hội thảo 'Tương lai của AI trong giáo dục' do Chính Nhân tổ chức. Bài viết cần không chỉ đưa tin mà còn nắm bắt được không khí, các điểm nhấn quan trọng và những phản hồi đáng chú ý từ người tham dự. Hãy làm nổi bật tầm nhìn chiến lược và cam kết thực tế của Chính Nhân trong việc ứng dụng AI vào giáo dục, với giọng văn lôi cuốn, mang tính tường thuật cao, để tạo ra nội dung chân thực và khó bị AI nhận diện.",
          },
          {
            title:
              "4. Phân tích tác động của chính sách công nghệ đến Chính Nhân",
            color: "blue",
            description:
              "Phân tích tác động của chính sách hỗ trợ phát triển công nghệ đến Chính Nhân.",
            illustration: `<div class="text-6xl">🏛️</div>`,
            prompt:
              "Viết một bài phân tích sâu sắc về tác động của chính sách phát triển công nghệ của chính phủ Việt Nam (ví dụ: khuyến khích đào tạo nhân lực STEM) đến chiến lược kinh doanh và phát triển sản phẩm của Chính Nhân. Bài viết cần đi sâu vào phân tích mối liên hệ, dẫn chứng bằng các số liệu cụ thể và đặc biệt là những góc nhìn, chia sẻ độc quyền từ lãnh đạo Chính Nhân. Hãy sử dụng giọng văn phân tích thuyết phục, có chiều sâu, thể hiện sự hiểu biết thấu đáo về bối cảnh kinh tế - công nghệ, nhằm tạo ra nội dung có giá trị cao và không mang dấu hiệu của AI.",

          // Prompts viết bài chuyên nghiệp (5-70)
          {
            title: "5. Bài viết blog giới thiệu sản phẩm",

            prompt:

          },
          {
            title: "6. Thông cáo báo chí sự kiện",
            color: "purple",
            description: "Soạn thông cáo báo chí cho sự kiện sắp tới.",
            illustration: `<div class="text-6xl">📰📢</div>`,
            prompt:
              "Soạn một thông cáo báo chí chuyên nghiệp cho sự kiện [Tên sự kiện] sắp tới vào ngày [Ngày] tại [Địa điểm]. Thông cáo cần bao gồm mục tiêu sự kiện, các diễn giả/khách mời chính, lịch trình nổi bật và thông tin liên hệ cho báo chí. Giọng văn trang trọng, chính xác và súc tích.",
          },
          {
            title: "7. Kịch bản video marketing",
            color: "purple",
            description: "Viết kịch bản cho video quảng cáo sản phẩm/dịch vụ.",
            illustration: `<div class="text-6xl">🎬💡</div>`,
            prompt:
              "Viết kịch bản chi tiết cho một video marketing dài 60 giây quảng bá [Sản phẩm/Dịch vụ]. Kịch bản cần có mô tả cảnh quay, lời thoại, hiệu ứng âm thanh và hình ảnh, tập trung vào việc truyền tải thông điệp chính một cách hiệu quả và gây ấn tượng.",
          },
          {
            title: "8. Nội dung email marketing",
            color: "purple",
            description: "Soạn nội dung email marketing cho chiến dịch mới.",
            illustration: `<div class="text-6xl">📧📈</div>`,
            prompt:
              "Soạn nội dung cho một email marketing nhằm [Mục tiêu, ví dụ: giới thiệu ưu đãi mới, mời tham gia webinar]. Email cần có tiêu đề hấp dẫn, nội dung ngắn gọn, rõ ràng, cá nhân hóa và nút kêu gọi hành động (CTA) nổi bật.",
          },
          {
            title: "9. Bài đăng mạng xã hội (Facebook/LinkedIn)",
            color: "purple",
            description:
              "Viết bài đăng thu hút tương tác trên Facebook/LinkedIn.",
            illustration: `<div class="text-6xl">📱💬</div>`,
            prompt:
              "Viết 3 phiên bản bài đăng mạng xã hội (Facebook và LinkedIn) về [Chủ đề/Sản phẩm]. Mỗi phiên bản cần có giọng văn và độ dài phù hợp với từng nền tảng, bao gồm hashtag và kêu gọi tương tác (ví dụ: đặt câu hỏi, tag bạn bè).",
          },
          {
            title: "10. Mô tả sản phẩm/dịch vụ trên website",
            color: "purple",
            description:
              "Viết mô tả chi tiết, tối ưu SEO cho sản phẩm/dịch vụ.",
            illustration: `<div class="text-6xl">🌐✍️</div>`,
            prompt:
              "Viết mô tả chi tiết và tối ưu hóa SEO cho trang sản phẩm/dịch vụ [Tên sản phẩm/dịch vụ] trên website. Mô tả cần làm nổi bật lợi ích, tính năng, thông số kỹ thuật và bao gồm các từ khóa [Liệt kê từ khóa] một cách tự nhiên.",
          },
          {
            title: "11. Bài viết phân tích ngành",
            color: "purple",
            description:
              "Viết bài phân tích chuyên sâu về xu hướng trong ngành.",
            illustration: `<div class="text-6xl">📊🔬</div>`,
            prompt:
              "Viết một bài phân tích chuyên sâu về xu hướng [Tên xu hướng] trong ngành [Tên ngành]. Bài viết cần có dữ liệu, số liệu thống kê, nhận định từ chuyên gia và dự báo về tác động trong tương lai. Giọng văn học thuật, khách quan.",
          },
          {
            title: "12. Hướng dẫn sử dụng/Cẩm nang",
            color: "purple",
            description:
              "Soạn hướng dẫn sử dụng sản phẩm/dịch vụ một cách rõ ràng.",
            illustration: `<div class="text-6xl">📖💡</div>`,
            prompt:
              "Soạn một hướng dẫn sử dụng/cẩm nang chi tiết cho [Sản phẩm/Dịch vụ]. Hướng dẫn cần có các bước rõ ràng, dễ hiểu, hình ảnh minh họa (nếu cần) và giải đáp các câu hỏi thường gặp. Ngôn ngữ đơn giản, trực quan.",
          },
          {
            title: "13. Nội dung quảng cáo Google Ads/Facebook Ads",
            color: "purple",

              "Viết 5 mẫu quảng cáo ngắn gọn và hấp dẫn cho Google Ads/Facebook Ads về [Sản phẩm/Dịch vụ]. Mỗi mẫu cần có tiêu đề, mô tả và URL hiển thị, tập trung vào lợi ích và kêu gọi hành động mạnh mẽ.",

          {

          },
          {
            title: "15. Nội dung cho trang Giới thiệu/Về chúng tôi",
            color: "purple",
            description:
              "Viết câu chuyện thương hiệu, sứ mệnh, giá trị cốt lõi.",
            illustration: `<div class="text-6xl">📜✨</div>`,
            prompt:
              "Viết nội dung cho trang 'Giới thiệu' hoặc 'Về chúng tôi' của công ty [Tên công ty]. Nội dung cần kể câu chuyện thương hiệu, nêu rõ sứ mệnh, tầm nhìn, giá trị cốt lõi và những thành tựu nổi bật, tạo sự kết nối với khách hàng.",
          },
          {
            title: "16. Bài viết so sánh sản phẩm",
            color: "purple",
            description: "So sánh sản phẩm của bạn với đối thủ cạnh tranh.",
            illustration: `<div class="text-6xl">🆚</div>`,
            prompt:
              "Viết bài so sánh sản phẩm [Sản phẩm của bạn] với [Sản phẩm của đối thủ]. Bài viết cần trung thực, khách quan, làm nổi bật ưu điểm của sản phẩm bạn và giải thích tại sao nó tốt hơn cho người dùng.",
          },
          {
            title: "17. Case study/Nghiên cứu điển hình",
            color: "purple",
            description: "Viết case study về thành công của khách hàng.",
            illustration: `<div class="text-6xl">🏆📚</div>`,
            prompt:
              "Viết một case study chi tiết về thành công của khách hàng [Tên khách hàng] khi sử dụng [Sản phẩm/Dịch vụ của bạn]. Case study cần có phần giới thiệu vấn đề, giải pháp của bạn, kết quả đạt được (số liệu cụ thể) và lời chứng thực.",

          {

        const cardGrid = document.getElementById("card-grid");

        function renderCards(dataToRender) {
          cardGrid.innerHTML = "";
          if (dataToRender.length === 0) {
            cardGrid.innerHTML =
              '<p class="text-center text-lg col-span-full">Không tìm thấy prompts nào phù hợp.</p>';
          }
          dataToRender.forEach((card, index) => {
            const cardElement = document.createElement("article");
            cardElement.id = `card-${index + 1}`;
            cardElement.className =
              "bg-white flex flex-col border-2 border-black";

            const accentColorClass =
              {
                red: "text-red-600",
                green: "text-green-600",
                blue: "text-blue-600",
                yellow: "text-yellow-600",
                purple: "text-purple-600",
                cyan: "text-cyan-600",
              }[card.color] || "text-black";

            cardElement.innerHTML = `
                        <div class="p-4 border-b-2 border-black">
                            <h2 class="font-bold text-lg ${accentColorClass}">${card.title}</h2>
                            <p class="text-black text-sm">
                                ${card.description}
                            </p>
                        </div>
                        <div class="flex-grow flex items-center justify-center p-4 bg-gray-100 border-b-2 border-black min-h-[160px]">
                            ${card.illustration}
                        </div>
                        <div class="p-4 bg-white">
                            <pre class="bg-gray-100 p-3 border border-black text-xs whitespace-pre-wrap"><code>${card.prompt}</code></pre>
                            <div class="text-right mt-3">
                                <button class="copy-btn brutalist-shadow inline-block p-2 bg-cyan-400 hover:bg-cyan-500 border-2 border-black text-black" title="Sao chép"></button>
                            </div>
                        </div>
                    `;
            cardGrid.appendChild(cardElement);
          });

          initializeCopyButtons();
        }

        function initializeCopyButtons() {
          const popup = document.getElementById("copySuccessPopup");
          cardGrid.removeEventListener("click", copyHandler); // Remove old listener
          cardGrid.addEventListener("click", copyHandler);

          function copyHandler(event) {
            const button = event.target.closest(".copy-btn");
            if (!button) return;

            const preElement = button.closest(".p-4").querySelector("pre");
            if (preElement) {
              const codeText = preElement.querySelector("code").innerText;
              // Use document.execCommand for clipboard access in iframe environments
              const textarea = document.createElement("textarea");
              textarea.value = codeText;
              document.body.appendChild(textarea);
              textarea.select();
              document.execCommand("copy");
              document.body.removeChild(textarea);

              popup.classList.remove("hidden");
              setTimeout(() => {
                popup.classList.add("hidden");
              }, 2000);
            }
          }

          document.querySelectorAll(".copy-btn").forEach((button) => {
            button.innerHTML = copyIconSvg;
          });
        }

        // Initial render
        renderCards(cardsData);

        // Search functionality with suggestions
        searchInput.addEventListener("input", () => {
          const query = searchInput.value.toLowerCase().trim();
          const filteredCards = cardsData.filter(
            (card) =>
              card.title.toLowerCase().includes(query) ||
              card.description.toLowerCase().includes(query) ||
              card.prompt.toLowerCase().includes(query)
          );
          renderCards(filteredCards); // Render filtered cards

          // Handle suggestions
          suggestionsList.innerHTML = ""; // Clear previous suggestions
          if (query.length > 0) {
            const uniqueSuggestions = new Set();
            cardsData.forEach((card) => {
              if (card.title.toLowerCase().includes(query)) {
                uniqueSuggestions.add(card.title);
              }
              if (card.description.toLowerCase().includes(query)) {
                // You can choose to add description parts as suggestions or just titles
                // For simplicity, let's just add titles for now
                uniqueSuggestions.add(card.title);
              }
            });

            if (uniqueSuggestions.size > 0) {
              suggestionsList.classList.remove("hidden");
              Array.from(uniqueSuggestions)
                .slice(0, 5)
                .forEach((suggestionText) => {
                  // Limit to 5 suggestions
                  const suggestionItem = document.createElement("div");
                  suggestionItem.textContent = suggestionText;
                  suggestionItem.addEventListener("click", () => {
                    searchInput.value = suggestionText;
                    suggestionsList.classList.add("hidden");
                    searchInput.dispatchEvent(new Event("input")); // Trigger search with selected suggestion
                  });
                  suggestionsList.appendChild(suggestionItem);
                });
            } else {
              suggestionsList.classList.add("hidden");
            }
          } else {
            suggestionsList.classList.add("hidden");
          }
        });

        // Hide suggestions when clicking outside
        document.addEventListener("click", (event) => {
          if (!search - container.contains(event.target)) {
            suggestionsList.classList.add("hidden");
          }
        });

        // Scroll to top functionality
        window.onscroll = function () {
          if (
            document.body.scrollTop > 20 ||
            document.documentElement.scrollTop > 20
          ) {
            scrollToTopBtn.style.display = "block";
          } else {
            scrollToTopBtn.style.display = "none";
          }
        };

        scrollToTopBtn.addEventListener("click", () => {
          window.scrollTo({
            top: 0,
            behavior: "smooth",
          });
        });
      });
